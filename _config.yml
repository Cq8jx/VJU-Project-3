title: Related Documents
theme: minima
collections:
  docs:
    output: true
header_pages:
  - index.md
  - index-vi.md
  - index-ja.md
defaults:
  - scope:
      path: ""
    values:
      layout: page
  - scope:
      path: ""
      type: pages
    values:
      nav_exclude: true
markdown_ext: "md,markdown"
titles_from_headings:
  enabled: false
exclude:
  - "**/Source/**/*_source.md"
  - "**/Source/**/*_source.pdf"
  - "**/Source/**/*_source.docx"
  - "AGENTS_VJU-Document.md"
